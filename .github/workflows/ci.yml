name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Lint client
        working-directory: client
        run: npm run lint

      - name: Lint server
        working-directory: server
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Test client
        working-directory: client
        run: npm test

      - name: Test server
        working-directory: server
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Build server
        working-directory: server
        run: npm run build
